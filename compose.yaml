services:
  frontail:
    build: .
    image: frontail:local
    container_name: frontail
    restart: unless-stopped
    ports:
      # host:container — change the host port via FRONTAIL_PORT if 9001 is taken
      - "${FRONTAIL_PORT:-9001}:9001"
    volumes:
      # Mount the host log directory read-only into the container at /log.
      # Point FRONTAIL_LOG_DIR at wherever your logs live on the host.
      - "${FRONTAIL_LOG_DIR:-/var/log}:/log:ro"
    # Paths are INSIDE the container (the host dir above is mounted at /log).
    # --log-dir makes EVERY log file found in the mounted folder selectable in
    # the UI dropdown. The optional file argument at the end is preselected;
    # without it frontail preselects /log/messages, or the first file found.
    command:
      - "--theme"
      - "${FRONTAIL_THEME:-dark}"
      - "--ui-highlight"
      # also echo tailed lines to container stdout (visible via `docker compose logs -f`);
      # remove this flag if you only want them in the browser
      - "--stdout"
      - "--log-dir"
      - "/log"
      - "/log/dpkg.log"
