<!DOCTYPE html>
<html>

<head>
    <title>tail -f __TITLE__</title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" class="theme-css" href="__PATH__/styles/__THEME__.css">
    <link rel="icon" href="__PATH__/favicon.ico">
</head>

<body>
    <nav class="topbar navbar navbar-inverse navbar-fixed-top" role="navigation">
        <div class="container-fluid">
            <div class="row">
                <div class="col-sm-4">
                    <span class="navbar-brand text-overflow" title="__TITLE__">tail -f __TITLE__</span>
                </div>
                <div class="col-sm-2">
                    <select class="form-control log-select" title="Choose which log to show" style="display: none;"></select>
                </div>
                <div class="col-sm-3 text-right">
                    <button type="button" class="btn btn-light btn-tool btn-font-dec" title="Decrease font size">A&minus;</button>
                    <button type="button" class="btn btn-light btn-tool btn-font-inc" title="Increase font size">A+</button>
                    <button type="button" class="btn btn-light btn-tool btn-zebra" title="Toggle zebra stripes"></button>
                    <button type="button" class="btn btn-light btn-tool btn-theme" title="Toggle dark / light theme"></button>
                    <button type="button" class="btn btn-light btn-tool btn-pause" data-toggle="button" aria-pressed="false" autocomplete="off"></button>
                </div>
                <div class="col-sm-3">
                    <form class="navbar-form-custom" role="search" onkeypress="return event.keyCode != 13;">
                        <input type="text" class="form-control query" placeholder="Filter" tabindex="1">
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid no-horiz-padding">
        <pre class="log"></pre>
    </div>


    <script src="__PATH__/socket.io/socket.io.js"></script>
    <script src="__PATH__/tinycon.min.js"></script>
    <script src="__PATH__/ansi_up.js"></script>
    <script src="__PATH__/app.js"></script>
    <script type="text/javascript">
        var socket = new io.connect('/__NAMESPACE__', {
            path: '__PATH__/socket.io',
            transports: ['websocket']
        });

        window.load = App.init({
            socket: socket,
            container: document.getElementsByClassName('log')[0],
            filterInput: document.getElementsByClassName('query')[0],
            logSelect: document.getElementsByClassName('log-select')[0],
            pauseBtn: document.getElementsByClassName('btn-pause')[0],
            themeLink: document.getElementsByClassName('theme-css')[0],
            themeBtn: document.getElementsByClassName('btn-theme')[0],
            zebraBtn: document.getElementsByClassName('btn-zebra')[0],
            fontIncreaseBtn: document.getElementsByClassName('btn-font-inc')[0],
            fontDecreaseBtn: document.getElementsByClassName('btn-font-dec')[0],
            topbar: document.getElementsByClassName('topbar')[0],
            body: document.getElementsByTagName('body')[0]
        });
    </script>
</body>

</html>
